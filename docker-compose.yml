services:
    livechat:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: livechat-server
        restart: unless-stopped
        env_file:
            - .env
        environment:
            - NODE_ENV=production
            - LIVECHAT_PORT=${LIVECHAT_PORT}
            - TOKEN=${TOKEN}
            - TENOR_API_KEY=${TENOR_API_KEY}
            - GIPHY_API_KEY=${GIPHY_API_KEY}
            - DOMAIN=${DOMAIN}
            - DISCORD_WEBHOOK_LOGS=${DISCORD_WEBHOOK_LOGS}
        ports:
            - '5000:5000'
        volumes:
            - ./logs:/app/logs
